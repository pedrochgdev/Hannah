# configs/hannah_360m.yaml

run_name: hannah_360m
seed: 42
dry_run: false

model:
  d_model: 1024
  n_heads: 16
  n_layers: 24
  mlp_ratio: 4
  weight_tying: false
  alibi: false
  rope: true                    # RoPE embeddings modernos
  attention_dropout: 0.0
  attention_layer_norm: false
  clip_qkv: null
  residual_dropout: 0.0
  embedding_dropout: 0.0
  layer_norm_type: rms          # RMSNorm como Llama
  activation_type: swiglu       # SwiGLU como Llama
  block_type: sequential
  vocab_size: 32000
  embedding_size: 32000
  max_sequence_length: 1024
  include_bias: false
  bias_for_layer_norm: false

optimizer:
  name: adamw
  learning_rate: 3.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  name: cosine_with_warmup
  t_warmup: 2000
  alpha_f: 0.1

tokenizer:
  identifier: tokenizer/hannah_tok
  truncate_direction: right

train_dataloader:
  dataset:
    type: text
    paths:
      - data/hannah/train.bin
  drop_last: true
  pin_memory: true
  batch_size: 8
  num_workers: 4

data:
  pad_direction: right
  generate_attention_mask: true

global_train_batch_size: 64       # 8 batch × 8 grad accumulation
device_train_batch_size: 8
device_train_grad_accum: 8        # para caber en 16GB

max_duration: 600000              # iteraciones totales
global_eval_batch_size: 8

save_folder: checkpoints/hannah_360m
save_interval: 5000
save_num_checkpoints_to_keep: 3

eval_interval: 1000

precision: amp_bf16               # bfloat16 para 5070 Ti

fsdp: null                        # sin multi-GPU

activation_checkpointing: true    # ahorra VRAM a costa de ~20% velocidad
